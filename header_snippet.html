            <style>
                /* Premium Lab Grid Styling - Hexagonal Track Design */
                .lab-container {
                    display: none;
                    padding: 60px 20px;
                    background: #ffffff;
                    text-align: center;
                    border-top: 1px solid #f0f0f0;
                    animation: slideDown 0.5s ease;
                }
                
                @keyframes slideDown {
                    from { opacity: 0; transform: translateY(-20px); }
                    to { opacity: 1; transform: translateY(0); }
                }

                .lab-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                    gap: 30px;
                    max-width: 1200px;
                    margin: 40px auto;
                    padding: 20px;
                }

                .lab-item {
                    position: relative;
                    padding: 25px 15px;
                    background: #fff;
                    cursor: pointer;
                    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                    text-decoration: none;
                    color: inherit;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                }

                /* Hexagonal Border Effect */
                .lab-item::before {
                    content: "";
                    position: absolute;
                    top: 0; left: 0; right: 0; bottom: 0;
                    border: 2px solid #e5e7eb;
                    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
                    transition: all 0.4s ease;
                    z-index: 1;
                }

                .lab-item:hover::before {
                    border-color: #6366f1;
                    transform: scale(1.1);
                    background: rgba(99, 102, 241, 0.03);
                }

                .lab-item i {
                    font-size: 2.5rem;
                    margin-bottom: 12px;
                    position: relative;
                    z-index: 2;
                }

                .lab-item p {
                    font-size: 0.9rem;
                    font-weight: 700;
                    margin: 0;
                    color: #374151;
                    position: relative;
                    z-index: 2;
                }

                .lab-item span {
                    font-size: 0.7rem;
                    color: #9ca3af;
                    margin-top: 4px;
                    position: relative;
                    z-index: 2;
                }

                .clickable-card {
                    cursor: pointer;
                    transition: all 0.3s ease;
                }
                
                .clickable-card:hover {
                    border-color: #6366f1;
                    background: rgba(99, 102, 241, 0.05);

/* Meta AI Style Floating Button */
#ai-toggle {
    position: fixed;
    right: 25px;
    bottom: 30px;
    /* Meta AI signature gradient */
    background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
    border: none;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.8rem;
    color: white;
    /* Soft glowing shadow like Meta AI */
    box-shadow: 0 10px 25px rgba(79, 172, 254, 0.5);
    z-index: 10000;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    justify-content: center;
}

#ai-toggle:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 15px 35px rgba(79, 172, 254, 0.7);
}

/* Chat Window - Adding Glassmorphism (Premium Look) */
#ai-window {
    display: none;
    position: fixed;
    right: 25px;
    bottom: 110px;
    width: 380px;
    height: 520px;
    background: rgba(255, 255, 255, 0.95);
    /* Glass effect */
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    z-index: 9999;
    overflow: hidden;
    flex-direction: column;
    animation: metaPop 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

@keyframes metaPop {
    from { opacity: 0; transform: translateY(30px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
