<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        /* Reset and Font */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #1a1a2e; /* Deep Navy Background */
    color: #ffffff;
}

/* The White Card Container */
.auth-card {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    text-align: center;
    position: relative;
    overflow: hidden;
}

/* Gradient Top Bar (Subtle touch from your image) */
.auth-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, #00d4ff, #6c63ff);
}

h2 {
    color: #1a1a2e;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 25px;
}

/* Labels and Sections */
.input-group {
    text-align: left;
    margin-bottom: 15px;
}

label {
    display: block;
    color: #333;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
}

/* Input Fields - Matching your image_dff50d.png */
input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    color: #333;
    background-color: #fdfdfd;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #6c63ff;
    box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
}

/* Action Button - Matching your image_dff50d.png */
.auth-btn {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00d4ff, #6c63ff);
    color: #000; /* Black text as per your preference */
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
}

/* Links */
.back-link {
    display: block;
    margin-top: 20px;
    color: #6c63ff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
}

.back-link:hover {
    text-decoration: underline;
}

/* Success Message Box */
.status-msg {
    background-color: #e6fffa;
    color: #2c7a7b;
    border: 1px solid #b2f5ea;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
    font-weight: 500;
}
    
        /* GLOBAL RESPONSIVE NAVBAR FIXES INJECTED */
        body, h1, h2, h3, h4, p, a, span, div, button, input, label, th, td { font-family: "Poppins", sans-serif; }

        @media (max-width: 768px) {
            .navbar {
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                gap: 12px !important;
                padding: 15px 10px !important;
                height: auto !important;
            }
            nav {
                display: flex !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                align-items: center !important;
                gap: 8px !important;
                width: 100% !important;
            }
            nav a, nav li a, .btn-logout, .btn-signup {
                font-size: 13px !important;
                padding: 5px 8px !important;
                white-space: nowrap !important;
            }
        }
        @media (max-width: 480px) {
            nav { gap: 4px !important; }
            nav a, nav li a, .btn-logout, .btn-signup { font-size: 11px !important; }
        }
</style>
</head>
<body>

<div class="auth-card">
    <h2>Forgot Password?</h2>

    <div id="status-msg" class="status-msg" style="display:none;">
        OTP sent to your Gmail! Inbox-ai check pannunga.
    </div>

    <form id="resetForm">
        {% csrf_token %}
        
        <div id="email-section">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="user-email" placeholder="example@gmail.com">
            </div>
            <button type="button" class="auth-btn" onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otp-section" style="display:none;">
            <div class="input-group">
                <label>Enter 6-Digit OTP</label>
                <input type="text" id="otp-code" placeholder=".  .  .  .  .  .">
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="new-pass" placeholder="At least 8 characters">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-pass" placeholder="Repeat new password">
            </div>
            <button type="button" class="auth-btn" onclick="resetPassword()">Reset Password</button>
        </div>
    </form>

    <a href="/login/" class="back-link">Back to Login</a>
</div>

<script>
    // Helper function to display messages
    /**
 * Helper function to display status messages in the UI.
 * @param {string} msg - The message to display.
 * @param {string} type - 'success' or 'error'.
 */
function showStatus(msg, type) {
    const statusDiv = document.getElementById('status-msg');
    statusDiv.innerText = msg;
    statusDiv.style.display = 'block';
    
    // Apply styling based on message type
    if (type === 'error') {
        statusDiv.style.backgroundColor = '#ffeef0';
        statusDiv.style.color = '#d9534f';
        statusDiv.style.border = '1px solid #f5c6cb';
    } else {
        statusDiv.style.backgroundColor = '#e6fffa';
        statusDiv.style.color = '#2c7a7b';
        statusDiv.style.border = '1px solid #b2f5ea';
    }
}

/**
 * Step 1: Sends the OTP to the user's email.
 */
async function sendOTP() {
    const emailField = document.getElementById('user-email');
    const sendBtn = document.querySelector('#email-section .auth-btn');

    if (!emailField.value) {
        showStatus("Please enter a valid email address.", "error");
        return;
    }

    // UI Feedback: Loading state
    sendBtn.innerText = "Sending OTP...";
    sendBtn.disabled = true;

    try {
        const response = await fetch('/forgot-password/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: new URLSearchParams({ 'email': emailField.value })
        });

        const data = await response.json();

        if (data.status === 'success') {
            // Transition to the OTP/Password Reset section
            document.getElementById('email-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
            showStatus("OTP sent! Please check your Gmail inbox.", "success");
        } else {
            showStatus(data.message, "error");
        }
    } catch (error) {
        showStatus("Server error. Please check your connection.", "error");
    } finally {
        sendBtn.innerText = "Send OTP";
        sendBtn.disabled = false;
    }
}

/**
 * Step 2: Verifies OTP and updates the password.
 */
async function resetPassword() {
    const otp = document.getElementById('otp-code').value;
    const newPass = document.getElementById('new-pass').value;
    const confirmPass = document.getElementById('confirm-pass').value;
    const resetBtn = document.querySelector('#otp-section .auth-btn');

    // Basic validation
    if (!otp || !newPass || !confirmPass) {
        showStatus("All fields are required.", "error");
        return;
    }

    if (newPass !== confirmPass) {
        showStatus("Passwords do not match.", "error");
        return;
    }

    // UI Feedback: Loading state
    resetBtn.innerText = "Updating Password...";
    resetBtn.disabled = true;

    try {
        const response = await fetch('/reset-password-logic/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: new URLSearchParams({
                'otp': otp,
                'new_password': newPass,
                'confirm_password': confirmPass
            })
        });

        const data = await response.json();

        if (data.status === 'success') {
            showStatus("Password reset successfully! Redirecting...", "success");
            // Redirect to login page after 2 seconds
            setTimeout(() => {
                window.location.href = '/login/';
            }, 2000);
        } else {
            showStatus(data.message, "error");
        }
    } catch (error) {
        showStatus("Reset failed. Please try again later.", "error");
    } finally {
        resetBtn.innerText = "Reset Password";
        resetBtn.disabled = false;
    }
}
</script>

</body>
</html>
