{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Preferences - AI Learning Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'basic.css' %}">
    <style>
        /* --- Styles From Your Template --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #1e1e2f; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 60px 20px; }
        .form-page-wrapper { width: 100%; display: flex; justify-content: center; }
        form { background: #ffffff; padding: 60px 80px; border-radius: 40px; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4); width: 100%; max-width: 1100px; position: relative; overflow: hidden; }
        form::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; height: 10px; background: linear-gradient(90deg, #00d4ff, #6c63ff); }
        h1 { font-size: 28px; color: #1e1e2f; text-align: center; margin-bottom: 5px; }
        .subtitle { display: block; text-align: center; color: #888; font-size: 14px; margin-bottom: 40px; }
        h3 { font-size: 14px; color: #1e1e2f; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 700; }
        .section-group { margin-bottom: 30px; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto; }
        label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
        input[type="text"], input[type="email"], select { width: 100%; padding: 14px 20px; border: 1px solid #e0e0e0; border-radius: 12px; background-color: #f9fafb; font-size: 14px; transition: 0.3s; outline: none; }
        ul { list-style: none; }
        li { display: flex; align-items: center; margin-bottom: 10px; }
        input[type="radio"] { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; accent-color: #00d4ff; }
        .auth-btn { display: block; width: 100%; max-width: 300px; margin: 40px auto 0; padding: 16px; background: #1e1e2f; color: #fff; border: none; border-radius: 50px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; }
        .auth-btn:hover { background: #00d4ff; color: #1e1e2f; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3); }
        hr { border: 0; border-top: 1px solid #eee; margin: 30px auto; max-width: 600px; }
    
        /* GLOBAL RESPONSIVE NAVBAR FIXES INJECTED */
        body, h1, h2, h3, h4, p, a, span, div, button, input, label, th, td { font-family: "Poppins", sans-serif; }

        @media (max-width: 768px) {
            .navbar {
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                gap: 12px !important;
                padding: 15px 10px !important;
                height: auto !important;
            }
            nav {
                display: flex !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                align-items: center !important;
                gap: 8px !important;
                width: 100% !important;
            }
            nav a, nav li a, .btn-logout, .btn-signup {
                font-size: 13px !important;
                padding: 5px 8px !important;
                white-space: nowrap !important;
            }
        }
        @media (max-width: 480px) {
            nav { gap: 4px !important; }
            nav a, nav li a, .btn-logout, .btn-signup { font-size: 11px !important; }
        }
</style>
</head>
<body>

    <div class="form-page-wrapper">
        <form id="profileForm">
            {% csrf_token %}
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="{% static 'brand_logo.png' %}" alt="Logo" style="height:80px; width:80px; object-fit:contain; margin-bottom:15px;">
                <h1 style="font-size:2rem; font-weight:800; color:#00d2ff; letter-spacing:1px; text-shadow:0 0 15px rgba(0,210,255,0.3);">AI LEARNING PATH</h1>
                <span class="subtitle">Information Collection - Personalize your learning path</span>
            </div>

            <div class="section-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your name" value="{{ username }}" required>
            </div>

            <div class="section-group">
                <label for="email">Email ID</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" readonly>
            </div>

            <hr>

            <div class="section-group">
                <h3>Current Skill Level</h3>
                <ul>
                    <li><input type="radio" id="fresher" name="skill" value="Fresher" required> <label for="fresher">Fresher</label></li>
                    <li><input type="radio" id="beginner" name="skill" value="Beginner"> <label for="beginner">Beginner</label></li>
                    <li><input type="radio" id="intermediate" name="skill" value="Intermediate"> <label for="intermediate">Intermediate</label></li>
                    <li><input type="radio" id="advanced" name="skill" value="Advanced"> <label for="advanced">Advanced</label></li>
                </ul>
            </div>

            <div class="section-group">
                <h3>Learning Goal</h3>
                <ul>
                    <li><input type="radio" id="goal1" name="goal" value="Competitive Programming" required> <label for="goal1">Competitive Programming</label></li>
                    <li><input type="radio" id="goal2" name="goal" value="Coding Interviews"> <label for="goal2">Coding Interviews</label></li>
                </ul>
            </div>

            <div class="section-group">
                <h3>Preferred Programming Language</h3>
                <select id="language" name="language" required>
                    <option value="" disabled selected>Select a language</option>
                    <option value="Python">Python</option>
                    <option value="Java">Java</option>
                    <option value="C">C</option>
                    <option value="C++">C++</option>
                </select>
            </div>

            <div class="section-group">
                <h3>Daily Study Time</h3>
                <ul>
                    <li><input type="radio" id="time1" name="study_time" value="1 Hour" required> <label for="time1">1 Hour</label></li>
                    <li><input type="radio" id="time2" name="study_time" value="2 Hours"> <label for="time2">2 Hours</label></li>
                </ul>
            </div>

            <div class="section-group">
                <h3>Target Duration</h3>
                <ul>
                    <li><input type="radio" id="dur1" name="duration" value="1 Month" required> <label for="dur1">1 Month</label></li>
                    <li><input type="radio" id="dur2" name="duration" value="2 Months"> <label for="dur2">2 Months</label></li>
                </ul>
            </div>

            <button type="submit" class="auth-btn">Submit & Save Profile</button>
        </form>
    </div>

    <script>
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Form refresh aagama thadukkum

        const formData = new FormData(this); // User choose panna language, skill ellathaiyum edukkum
        
        // Django CSRF security check-kaga indha token mukkiam
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        fetch('/update-profile/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': csrftoken
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (data.status === 'success') {
                // Success Message
                alert("Profile Saved! Now, let's start the Skill Assessment. 🎯");
                
                // MUKKIAM: Inga dhaan Assessment page-ku redirect aagum
                // Unga urls.py-la assessment-ku enna path kuduthurukeengalo adhai inga podunga
                window.location.href = '/assessment/'; 
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Connection error! Check if your Django server is running.");
        });
    });
    // Profile form submit aagumpodhu
fetch('/update-profile/', {
    method: 'POST',
    body: formData
})
.then(response => response.json())
.then(data => {
    if (data.status === 'success') {
        // AUTOMATIC-AH ASSESSMENT PAGE-KU POGUM
        window.location.href = data.redirect_url; 
    }
});
</script>
</body>
</html>
