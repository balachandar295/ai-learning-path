<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<style>
/* Meta AI Style Floating Button */
#ai-toggle {
    position: fixed !important; right: 25px; bottom: 30px;
    background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
    border: none; width: 65px; height: 65px; border-radius: 50%;
    cursor: pointer; font-size: 1.8rem; color: white;
    box-shadow: 0 10px 25px rgba(79, 172, 254, 0.5); z-index: 999999 !important;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex; align-items: center; justify-content: center;
}
#ai-toggle:hover {
    transform: scale(1.1) rotate(15deg); box-shadow: 0 15px 35px rgba(79, 172, 254, 0.7);
}
#ai-window {
    display: none; position: fixed !important; right: 25px; bottom: 110px; width: 400px; height: 520px;
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); z-index: 999998 !important;
    overflow: hidden; flex-direction: column; animation: metaPop 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}
@keyframes metaPop { from { opacity: 0; transform: translateY(30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
.markdown-body { font-size: 1rem; line-height: 1.6; }
.markdown-body ul { padding-left: 20px; margin-bottom: 10px; }
.markdown-body li { margin-bottom: 8px; }
.markdown-body strong { color: #1e293b; display: inline-block; margin-top: 5px; }

        /* GLOBAL RESPONSIVE NAVBAR FIXES INJECTED */
        body, h1, h2, h3, h4, p, a, span, div, button, input, label, th, td { font-family: "Poppins", sans-serif; }

        @media (max-width: 768px) {
            .navbar {
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                gap: 12px !important;
                padding: 15px 10px !important;
                height: auto !important;
            }
            nav {
                display: flex !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                align-items: center !important;
                gap: 8px !important;
                width: 100% !important;
            }
            nav a, nav li a, .btn-logout, .btn-signup {
                font-size: 13px !important;
                padding: 5px 8px !important;
                white-space: nowrap !important;
            }
            #ai-window {
                width: 90vw;
                right: 5vw;
                bottom: 150px; 
                height: 75vh;
            }
        }
        @media (max-width: 480px) {
            nav { gap: 4px !important; }
            nav a, nav li a, .btn-logout, .btn-signup { font-size: 11px !important; }
            
            #ai-toggle {
                width: 65px;
                height: 65px;
                right: 35px; /* Moved to LEFT side */
                bottom: 80px; 
            }
            #ai-window {
                width: 90vw;
                right: 5vw;
                bottom: 160px;
            }
        }
</style>

<div id="ai-chat-wrapper" style="position: fixed; bottom: 30px; right: 30px; z-index: 99999;">
    <button id="ai-toggle"><i class="fas fa-robot"></i></button>

    <div id="ai-window">
        <div style="background: #1e1e2f; color: white; padding: 18px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600;"><i class="fas fa-brain"></i> AI Mentor</span>
            <div style="display: flex; gap: 18px; align-items: center;">
                <i class="fas fa-volume-up" id="voice-toggle" style="cursor: pointer; font-size: 1.2rem;" title="Toggle Voice"></i>
                <i class="fas fa-trash-alt" id="clear-btn" style="cursor: pointer; font-size: 1.1rem;" title="Clear & Archive"></i>
                <span id="close-ai" style="cursor: pointer; font-size: 1.8rem; line-height: 1;">&times;</span>
            </div>
        </div>

        <div id="ai-messages" style="flex: 1; padding: 15px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 12px;"></div>

        <div style="padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px;">
            <input type="text" id="ai-input" placeholder="Ask your doubt..." style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none;">
            <button id="send-ai" style="background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; color: white; padding: 0 18px; border-radius: 12px; cursor: pointer;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const aiToggle = document.getElementById('ai-toggle');
    const aiWindow = document.getElementById('ai-window');
    const aiInput = document.getElementById('ai-input');
    const sendBtn = document.getElementById('send-ai');
    const messagesContainer = document.getElementById('ai-messages');
    const voiceBtn = document.getElementById('voice-toggle');
    const clearBtn = document.getElementById('clear-btn');
    const closeBtn = document.getElementById('close-ai');

    
    const currentUser = "{% if user.is_authenticated %}{{ user.first_name|default:user.username|escapejs }}{% else %}guest{% endif %}";
    const historyKey = 'ai_chat_history_' + currentUser;
    const archiveKey = 'ai_chat_archive_' + currentUser;
    const voicePrefKey = 'ai_voice_pref_' + currentUser;

    let isVoiceEnabled = localStorage.getItem(voicePrefKey) !== 'false';

    // Set initial voice button state based on local storage
    if (!isVoiceEnabled) {
        voiceBtn.className = 'fas fa-volume-mute';
        voiceBtn.style.color = '#ff4d4d';
    } else {
        voiceBtn.className = 'fas fa-volume-up';
        voiceBtn.style.color = 'white';
    }

    function speakText(text) {
        if (!isVoiceEnabled) return;
        window.speechSynthesis.cancel();
        const cleanText = text.replace(/<\/?[^>]+(>|$)/g, ""); 
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    function appendMessage(sender, text, id = null, save = true) {
        const bubble = document.createElement('div');
        if (id) bubble.id = id;
        const isAi = (sender === 'AI');
        
        bubble.style.cssText = `
            padding: 12px 16px; 
            border-radius: ${isAi ? '18px 18px 18px 4px' : '18px 18px 4px 18px'};
            align-self: ${isAi ? 'flex-start' : 'flex-end'};
            background: ${isAi ? '#ffffff' : 'linear-gradient(135deg, #6366f1 0%, #4f46e5 100%)'};
            color: ${isAi ? '#1e293b' : 'white'};
            margin-bottom: 5px; max-width: 85%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 14px;
        `;
        
        if (isAi) {
            let parsedText = text;
            try { if (typeof marked !== 'undefined') parsedText = marked.parse(text); } catch(e) {}
            bubble.innerHTML = `<strong>AI Mentor:</strong> <div class="markdown-body">${parsedText}</div>`;
            setTimeout(() => { if (typeof Prism !== 'undefined') Prism.highlightAllUnder(bubble); }, 50);
            if (save) speakText(text);
        } else {
            bubble.innerHTML = `<strong>You:</strong><br>${text}`;
        }

        messagesContainer.appendChild(bubble);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });

        if (save) {
            const history = JSON.parse(localStorage.getItem(historyKey) || '[]');
            history.push({ sender, text });
            localStorage.setItem(historyKey, JSON.stringify(history));
        }
    }

    clearBtn.onclick = function() {
        if(confirm("Are you sure you want to clear the chat history?")) {
            const currentHistory = localStorage.getItem(historyKey);
            let archive = JSON.parse(localStorage.getItem(archiveKey) || '[]');
            if(currentHistory) {
                archive.push({ timestamp: new Date().toLocaleString(), messages: JSON.parse(currentHistory) });
                localStorage.setItem(archiveKey, JSON.stringify(archive));
            }
            localStorage.removeItem(historyKey);
            messagesContainer.innerHTML = '';
            appendMessage('AI', 'History archived successfully! Chat screen cleared.', null, false);
        }
    };

    const saved = JSON.parse(localStorage.getItem(historyKey) || '[]');
    if(saved.length === 0) {
        appendMessage('AI', `Hello <strong>${currentUser}</strong>! Ready to start? 🚀`, null, false);
    } else {
        saved.forEach(msg => appendMessage(msg.sender, msg.text, null, false));
    }

    voiceBtn.onclick = function() {
        isVoiceEnabled = !isVoiceEnabled;
        this.className = isVoiceEnabled ? 'fas fa-volume-up' : 'fas fa-volume-mute';
        this.style.color = isVoiceEnabled ? 'white' : '#ff4d4d';
        localStorage.setItem(voicePrefKey, isVoiceEnabled);
        
        // Immediately stop talking if muted!
        if (!isVoiceEnabled) {
            window.speechSynthesis.cancel();
        }
    };


    async function handleSend() {
        const query = aiInput.value.trim();
        if (!query) return;
        appendMessage('You', query);
        aiInput.value = '';
        const thinkingId = 'ai-th-' + Date.now();
        appendMessage('AI', 'Thinking...', thinkingId, false);

        try {
            // Re-using the same AI endpoint you've already implemented in views.py
            const response = await fetch('/ai-chat/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ message: query })
            });
            const data = await response.json();
            const th = document.getElementById(thinkingId);
            if(th) th.remove();
            if (data.response) appendMessage('AI', data.response);
        } catch (e) {
            const th = document.getElementById(thinkingId);
            if(th) th.innerText = "Connection Error! Make sure you are logged in.";
        }
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    sendBtn.onclick = handleSend;
    aiInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    aiToggle.onclick = () => aiWindow.style.display = (aiWindow.style.display === 'none' || aiWindow.style.display === '') ? 'flex' : 'none';
    closeBtn.onclick = () => aiWindow.style.display = 'none';
});
</script>
