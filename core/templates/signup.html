{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Learning Path</title>
    <link rel="stylesheet" href="{% static 'basic.css' %}">
    <style>
        /* Social Login UI Styles */
        .social-login { margin-top: 20px; text-align: center; }
        .social-login p { margin-bottom: 15px; color: #888; font-size: 0.9rem; position: relative; }
        .social-login p::before, .social-login p::after {
            content: ""; position: absolute; top: 50%; width: 30%; height: 1px; background: #ddd;
        }
        .social-login p::before { left: 0; }
        .social-login p::after { right: 0; }

        .google-btn {
            width: 100%; padding: 12px; background: white; border: 1px solid #ddd; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            cursor: pointer; font-weight: 500; font-family: inherit; transition: 0.3s ease; color: #333;
            border: 1px solid #ccc;
        }
        .google-btn:hover { background: #f8f9fa; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Layout Fixes */
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .auth-card { max-width: 400px; margin: 50px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; text-align: center; }
        .auth-btn { width: 100%; padding: 12px; background-color: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .auth-btn:hover { background-color: #333; }
        
        .terms { font-size: 0.85rem; margin-bottom: 15px; text-align: left; }
        .redirect { margin-top: 20px; font-size: 0.9rem; }
    
        /* GLOBAL RESPONSIVE NAVBAR FIXES INJECTED */
        body, h1, h2, h3, h4, p, a, span, div, button, input, label, th, td { font-family: "Poppins", sans-serif; }

        @media (max-width: 768px) {
            .navbar {
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                gap: 12px !important;
                padding: 15px 10px !important;
                height: auto !important;
            }
            nav {
                display: flex !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                align-items: center !important;
                gap: 8px !important;
                width: 100% !important;
            }
            nav a, nav li a, .btn-logout, .btn-signup {
                font-size: 13px !important;
                padding: 5px 8px !important;
                white-space: nowrap !important;
            }
        }
        @media (max-width: 480px) {
            nav { gap: 4px !important; }
            nav a, nav li a, .btn-logout, .btn-signup { font-size: 11px !important; }
        }
</style>
</head>
<body>
    <header class="navbar" style="padding: 5px 60px;">
        <div class="logo" style="display:flex; align-items:center; gap:12px;">
            <img src="{% static 'brand_logo.png' %}" alt="Logo" style="height:65px;width:65px;object-fit:contain;">
            <span style="font-size:1.9rem; font-weight:800; color:#00d2ff; letter-spacing:1px; font-family:Poppins,sans-serif; text-shadow:0 0 15px rgba(0,210,255,0.3);">AI LEARNING PATH</span>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" class="btn-signup">Sign Up</a>
        </nav>
    </header>

    <section id="signup-section" class="auth-container bg-alt">
        <div class="auth-card">
            <h2>Create a New Account</h2>
            <p class="subtitle">Get Started with AI Learning</p>
            
            <form id="registrationForm">
                {% csrf_token %}
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter Your Name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create strong password" required>
                    <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 35px; background: none; border: none; cursor: pointer; font-size: 1.2rem;">👁️</button>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>
                <div class="terms">
                    <label><input type="checkbox" required> I agree to the Terms and Conditions</label>
                </div>
                <button type="submit" class="auth-btn signup-btn">Register</button>
            </form>

            <div class="social-login">
                <p>OR</p>
            <form method="post" action="{% provider_login_url 'google' next='/profile/' %}">
    {% csrf_token %}
    <button type="submit" class="google-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="20px"> 
        Continue with Google
    </button>
</form>
            </div>
            
            <p class="redirect">Already have an account? <a href="{% url 'login' %}">Login</a></p>
        </div>
    </section>

    <script>
    // Clear all AI chat histories whenever the signup screen is loaded
    // This ensures the next user starts with a completely fresh AI chat.
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key && (key.startsWith('ai_chat_history_') || key.startsWith('ai_chat_archive_'))) {
            keysToRemove.push(key);
        }
    }
    keysToRemove.forEach(k => localStorage.removeItem(k));
    
    // 1. CSRF Token Helper
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // 2. Form Submission Logic
    const registrationForm = document.getElementById('registrationForm');
    if (registrationForm) {
        registrationForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Basic Validation
            if (password !== confirmPassword) { 
                alert("Passwords do not match!"); 
                return; 
            }
            if (password.length < 8) { 
                alert("Password must be at least 8 characters!"); 
                return; 
            }

            try {
                // Endpoint must match your urls.py path exactly
                const response = await fetch('/register/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'X-CSRFToken': getCookie('csrftoken') 
                    },
                    body: JSON.stringify({ 
                        full_name: fullName, 
                        email: email, 
                        password: password 
                    })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    alert("Signup Success! ✅");
                    window.location.href = result.redirect_url; 
                } else {
                    // This handles existing emails or database errors
                    alert("Error: " + (result.error || "Registration failed. Try a different email."));
                }
            } catch (error) { 
                console.error("Fetch Error:", error);
                alert("Server connection failed. Is 'python manage.py runserver' running?"); 
            }
        });
    }

    // 3. Password Visibility Toggle
    const toggleBtn = document.querySelector('#togglePassword');
    const pwInput = document.querySelector('#password');
    if (toggleBtn && pwInput) {
        toggleBtn.addEventListener('click', function () {
            const type = pwInput.getAttribute('type') === 'password' ? 'text' : 'password';
            pwInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });
    }

    </script>
</body>
</html>
